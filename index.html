<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Test online - tesla-public</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           margin: 0; min-height: 100vh; display: grid; place-items: center;
           background: #0f172a; color:#e2e8f0; }
    .card { text-align: center; padding: 28px 32px; border-radius: 16px;
            background: #111827; box-shadow: 0 10px 30px rgba(0,0,0,.35);
            border: 1px solid #334155; max-width: 720px; }
    h1 { margin: 0 0 8px; font-size: 28px;}
    p { margin: 6px 0; opacity: .9; }
    code { background:#0b1220; padding:2px 6px; border-radius:6px; }
    .ok { display:inline-block; margin-top:14px; padding:10px 14px; 
          background:#10b981; color:#052e2b; border-radius:8px; font-weight:700;}
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Pagina online</h1>
    <p>Se vedi questa schermata, il deploy è andato a buon fine.</p>
    <p>Repo: <code>thefly1976/tesla-public</code></p>
    <p id="when"></p>
    <span class="ok">Cloudflare Pages / GitHub Pages OK</span>
  </div>
  <script>document.getElementById('when').textContent = 
    'Build time (browser): ' + new Date().toLocaleString();</script>
</body>
</html>
